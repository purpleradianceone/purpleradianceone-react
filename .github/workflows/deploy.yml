name: Build and Deploy React App via Docker

on:
  push:
    branches:
      - development
      - production
      -main
    

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/react-app:${{ github.ref_name }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/react-app:${{ github.ref_name }}

      - name: SSH and Deploy on Hostinger VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/react-app:${{ github.ref_name }}

            docker stop react-app || true
            docker rm react-app || true

            docker run -d \
              --name react-app \
              --network purple-net \
              -v /var/certs/cdranalysis.com:/etc/nginx/certs:ro \
              -p 80:80 -p 443:443 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/react-app:${{ github.ref_name }}
