name: Build and Deploy React App via Docker

on:
  push:
    branches:
      - development
      - production
    # - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker image locally (tag without Docker Hub)
      - name: Build Docker Image
        run: |
          docker build -t react-app:${{ github.ref_name }} .

      # Save Docker image as tarball artifact to send to server
      - name: Save Docker Image
        run: docker save react-app:${{ github.ref_name }} -o react-app.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-app-image
          path: react-app.tar

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-app-image
          path: .

      - name: Copy Image to Hostinger VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: "react-app.tar"
          target: "~/"

      - name: Deploy React App on VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            docker load -i ~/react-app.tar

            docker stop react-app || true
            docker rm react-app || true

            docker run -d \
              --name react-app \
              --network host \
              -p 80:80 -p 443:443 \
              -v ${{ secrets.LETSENCRYPT_PATH }}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro \
              -v ${{ secrets.LETSENCRYPT_PATH }}/privkey.pem:/etc/nginx/certs/privkey.pem:ro \
             -e MAIN_DOMAIN=${{ secrets.MAIN_DOMAIN }} \
              --restart always \
              react-app:${{ github.ref_name }}

            echo "Cleaning up TAR file..."
            rm -f /root/react-app.tar

            echo "Deployment complete. Running container status:"
            docker ps --filter "name=react-app"

            echo "Recent logs from container:"
            docker logs --tail=50 react-app
