name: Build and Deploy React App

on:
  push:
    branches:
      - development
      - production
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and Build React App
        run: |
          npm install
          npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_REPONAME }}/purple-crm-react:${{ github.ref_name }} .
          docker push ${{ secrets.DOCKERHUB_REPONAME }}/purple-crm-react:${{ github.ref_name }}

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_REPONAME }}/purple-crm-react:${{ github.ref_name }}
            docker stop purple-crm-react || true
            docker rm purple-crm-react || true
            docker run -d \
              --name purple-crm-react \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_REPONAME }}/purple-crm-react:${{ github.ref_name }}
