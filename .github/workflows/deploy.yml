name: Build and Deploy React App via Docker

on:
  push:
    branches:
      - development
      - production
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'

concurrency:
  group: react-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Cache Docker layers (faster builds)
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ✅ Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg ENV_PROFILE=${{ secrets.ENV_PROFILE }} \
            --build-arg VITE_RAZORPAY_API_ID_KEY=${{ secrets.VITE_RAZORPAY_API_ID_KEY }} \
            --build-arg VITE_SITE_KEY_OF_CAPTCHA=${{ secrets.VITE_SITE_KEY_OF_CAPTCHA }} \
            -t ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.ref_name }} .

          docker push ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment: ${{ github.ref_name }}

    steps:
      - name: Deploy React App on VPS via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.ref_name }}

            docker stop react-app || true
            docker rm react-app || true

            docker run -d \
              --name react-app \
              --network purple-net \
              -v ${{ secrets.LETSENCRYPT_PATH }}:/etc/nginx/certs:ro \
              -p 80:80 -p 443:443 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.ref_name }}
