name: Deploy React App Frontend

on:
  push:
    branches:
      - development
      - production
      - main # Or whatever branch triggers your deployments

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Ensure this matches your project's Node.js version

      - name: Install Dependencies and Build React App
        run: |
          npm install
          npm run build # This command creates your production-ready static files (usually in 'build/' or 'dist/')

      - name: SSH and Deploy Frontend to Hostinger VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            # Clean up the existing Nginx HTML directory to ensure a fresh deployment
            sudo rm -rf /usr/share/nginx/html/*

            # Create the directory if it doesn't exist (though Nginx usually ensures this)
            sudo mkdir -p /usr/share/nginx/html/

            # Set ownership and permissions for the Nginx web root
            # This is crucial so Nginx (running as www-data) can serve the files
            sudo chown -R www-data:www-data /usr/share/nginx/html/
            sudo chmod -R 755 /usr/share/nginx/html/
          upload:
            # Source: Path to your React app's build output on the GitHub Actions runner
            # Adjust './build/' to './dist/' if your build command creates a 'dist' folder
            source: "./build/"
            # Target: The directory on your VPS where Nginx is configured to serve files from
            target: "/usr/share/nginx/html/"

      - name: Deployment Complete
        run: echo "React frontend deployed successfully to Hostinger VPS."

# Note: This workflow only handles the React frontend.
# If you have separate backend services deployed via Docker, their deployment logic
# would need to be in a separate job or integrated here if you decide to manage all
# Docker services from this same workflow.
# This workflow will NOT stop/start any Docker containers on your VPS for the frontend.
