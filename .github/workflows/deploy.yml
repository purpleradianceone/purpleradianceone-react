name: Build and Deploy React App via Docker

on:
  push:
    branches:
      - development
      - production
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'

concurrency:
  group: react-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Build Docker image locally
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg ENV_PROFILE=${{ secrets.ENV_PROFILE }} \
            --build-arg VITE_RAZORPAY_API_ID_KEY=${{ secrets.VITE_RAZORPAY_API_ID_KEY }} \
            --build-arg VITE_SITE_KEY_OF_CAPTCHA=${{ secrets.VITE_SITE_KEY_OF_CAPTCHA }} \
            -t react-app:${{ github.ref_name }} .

      # ✅ Compress image (BIG quota saver)
      - name: Save & Compress Docker Image
        run: |
          docker save react-app:${{ github.ref_name }} | gzip > react-app.tar.gz

      # ✅ Upload smaller artifact
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-app-image
          path: react-app.tar.gz
          retention-days: 1   # 🔥 reduce storage usage

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment: ${{ github.ref_name }}

    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-app-image
          path: .

      # ✅ Copy compressed file (faster SCP)
      - name: Copy Image to Hostinger VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: "react-app.tar.gz"
          target: "~/"

      - name: Deploy React App on VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            gunzip -c ~/react-app.tar.gz | docker load

            docker stop react-app || true
            docker rm react-app || true

            docker run -d \
              --name react-app \
              --network purple-net \
              -v ${{ secrets.LETSENCRYPT_PATH }}:/etc/nginx/certs:ro \
              -p 80:80 -p 443:443 \
              --restart always \
              react-app:${{ github.ref_name }}
