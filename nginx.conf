# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name cdranalysis.com *.cdranalysis.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name cdranalysis.com *.cdranalysis.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Serve React frontend (static files)
    root /usr/share/nginx/html;
    index index.html;

    # React frontend route fallback
    location / {
        try_files $uri /index.html;
    }

    # === Reverse proxy rules ===

    # Client Service
    location /api/client/ {
        proxy_pass http://purple-crm-client-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth Service
    location /api/authentication/ {
        proxy_pass http://purple-crm-authentiaction-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Config Service (optional, usually internal only)
    location /api/config/ {
        proxy_pass http://purple-crm-config-service:8084/;
    }

    # Notification Service
    location /api/notification/ {
        proxy_pass http://purple-crm-notification-service:8080/;
        proxy_set_header Host $host;
    }

    # Main Service
    location /api/main/ {
        proxy_pass http://purple-crm-main-service:8080/;
        proxy_set_header Host $host;
    }

    # Inventory Service
    location /api/inventory/ {
        proxy_pass http://purple-crm-inventory-service:8080/;
        proxy_set_header Host $host;
    }

    # Server Service (optional)
    location /api/server/ {
        proxy_pass http://purple-crm-server-service:8080/;
    }

    # Zipkin tracing (optional)
    location /zipkin/ {
        proxy_pass http://zipkin:9411/;
    }
}

