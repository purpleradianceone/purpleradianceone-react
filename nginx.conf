# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name cdranalysis.com *.cdranalysis.com;
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl;
    server_name cdranalysis.com *.cdranalysis.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Serve React frontend
    root /usr/share/nginx/html;
    index index.html;

    # React SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # === Backend reverse proxy routes ===

    location /api/client/ {
        proxy_pass http://purple-crm-client-service:8080/;
        include proxy_params;
    }

    location /api/authentication/ {
        proxy_pass http://purple-crm-authentiaction-service:8080/;
        include proxy_params;
    }

    location /api/config/ {
        proxy_pass http://purple-crm-config-service:8084/;
        include proxy_params;
    }

    location /api/notification/ {
        proxy_pass http://purple-crm-notification-service:8080/;
        include proxy_params;
    }

    location /api/main/ {
        proxy_pass http://purple-crm-main-service:8080/;
        include proxy_params;
    }

    location /api/inventory/ {
        proxy_pass http://purple-crm-inventory-service:8080/;
        include proxy_params;
    }

    location /api/server/ {
        proxy_pass http://purple-crm-server-service:8080/;
        include proxy_params;
    }

    location /zipkin/ {
        proxy_pass http://zipkin:9411/;
    }

    # Standard proxy headers for all
    include /etc/nginx/proxy_params;
}
