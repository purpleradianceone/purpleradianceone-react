# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name cdranalysis.com *.cdranalysis.com;
    return 301 https://$host$request_uri;
}

# HTTPS server with reverse proxy and static React app
server {
    listen 443 ssl;
    server_name cdranalysis.com *.cdranalysis.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Serve React frontend (static files)
    root /usr/share/nginx/html;
    index index.html;

    # SPA route fallback (React)
    location / {
        try_files $uri /index.html;
    }

    # === Reverse Proxy to Spring Cloud Gateway ===
    # All backend API requests are routed through the client-service (API Gateway)

    location /api/client/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/authentication/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/notification/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/main/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/inventory/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/config/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
    }

    location /api/server/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
    }

    # Optional: Zipkin direct access
    location /zipkin/ {
        proxy_pass http://zipkin:9411/;
        proxy_set_header Host $host;
    }
}
