# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name cdranalysis.com *.cdranalysis.com;
    return 301 https://$host$request_uri;
}

# HTTPS server with reverse proxy and static React app
server {
    listen 443 ssl;
    server_name cdranalysis.com *.cdranalysis.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Serve React frontend (static files)
    root /usr/share/nginx/html;
    index index.html;

    # SPA route fallback (React)
    location / {
        try_files $uri /index.html;
    }

    # === Reverse Proxy to Spring Cloud Gateway for ALL API requests ===
    # All backend API requests (including authentication, notification, main, inventory,
    # config, and server) are routed through the purple-crm-client-service (API Gateway).
    # This ensures that filters like JwtAuthenticationFilter in the gateway are applied
    # where configured in its application.yml.
    location /api/ {
        proxy_pass http://purple-crm-client-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Zipkin direct access (for monitoring, typically bypasses the gateway)
    location /zipkin/ {
        proxy_pass http://zipkin:9411/;
        proxy_set_header Host $host;
    }
}
server {
    listen 443 ssl;
    server_name rabbitmq.cdranalysis.com; # Use a specific subdomain for RabbitMQ

    ssl_certificate     /etc/nginx/certs/fullchain.pem; # Ensure this certificate covers rabbitmq.cdranalysis.com
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Configure proxy to the RabbitMQ management interface (default port 15672)
    # Assuming 'rabbitmq' is the name of your RabbitMQ container on the 'purple-net' network
    location / {
        proxy_pass http://rabbitmq:15672; # Proxy to the RabbitMQ container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for RabbitMQ management UI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
